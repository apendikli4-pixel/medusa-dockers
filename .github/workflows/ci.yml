name: CI — Build Gate

# Her push ve PR'da backend tip kontrolü + storefront production build çalışır.
# Amaç: bozuk bir commit'in (eksik import, tip hatası vb.) fark edilmeden
# deploy'a gitmesini engellemek. Kırmızıysa deploy etmeyin.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-typecheck:
    name: Backend (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install --legacy-peer-deps
      - name: TypeScript check
        run: npx tsc --noEmit

  storefront-build:
    name: Storefront (next build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: storefront
    env:
      NODE_ENV: production
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: https://api.141.98.48.155.sslip.io
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_ci_placeholder
      NEXT_PUBLIC_BASE_URL: https://ayna.141.98.48.155.sslip.io
      NEXT_PUBLIC_SEARCH_ENDPOINT: https://api.141.98.48.155.sslip.io
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install --legacy-peer-deps
      - name: Production build
        run: npm run build
