name: CI — Lint, Type Check, Test & Build Gate

# Her push ve PR'da tam CI pipeline çalışır:
#   1. Backend: tsc + jest testleri + coverage
#   2. Storefront: lint + tsc + production build
#   3. Docker: image build doğrulaması (push etmez)
# Amaç: bozuk commit'in deploy'a gitmesini engellemek.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────
  # Backend: TypeScript + Tests
  # ────────────────────────────────────────
  backend:
    name: Backend (tsc + jest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install deps
        run: npm ci --legacy-peer-deps
      # Mimari geçit: deterministik invariant denetçisi. Pre-commit atlansa (--no-verify)
      # bile bozuk/izolasyon-delen kod buradan geçemez — sunucu tarafı, atlanamaz.
      - name: Architecture invariant gate
        run: npm run audit:lint
      # Denetçinin kendisi de denetlenir: kural regresyonu testlerle yakalanır.
      - name: Invariant rule self-tests
        run: npm run audit:test
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Run tests
        run: npm test -- --ci --coverage --maxWorkers=2
        env:
          NODE_ENV: test
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/
          retention-days: 7

  # ────────────────────────────────────────
  # Storefront: Lint + Build
  # ────────────────────────────────────────
  storefront-build:
    name: Storefront (lint + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: storefront
    env:
      NODE_ENV: production
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: https://api.141.98.48.155.sslip.io
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_ci_placeholder
      NEXT_PUBLIC_BASE_URL: https://ayna.141.98.48.155.sslip.io
      NEXT_PUBLIC_SEARCH_ENDPOINT: https://api.141.98.48.155.sslip.io
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: storefront/package-lock.json
      - name: Install deps
        run: npm ci --legacy-peer-deps
      # Storefront tip güvenliği: 'next lint' kurulu değil (interaktif, anlamsızdı).
      # Yerine gerçek tsc geçidi — tip-uyumsuz storefront kodu sunucuda yakalanır.
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Production build
        run: npm run build

  # ────────────────────────────────────────
  # Docker: Build validation (no push)
  # ────────────────────────────────────────
  docker-validate:
    name: Docker Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend, storefront-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image (dry-run)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: medusa-backend:ci-${{ github.sha }}

