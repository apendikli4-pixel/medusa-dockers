services:
  # ═══════════════════════════════════════════════════════════════
  # PostgreSQL Database (pgvector)
  # ═══════════════════════════════════════════════════════════════
  postgres:
    image: pgvector/pgvector:pg15
    container_name: medusa_postgres_v2
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medusa-store}
      POSTGRES_USER: ${POSTGRES_USER:-medusa_db_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medusa_db_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medusa_network

  # ═══════════════════════════════════════════════════════════════
  # Redis HA: Master Node
  # AOF + RDB persistence ile veri kaybı önlenir
  # ═══════════════════════════════════════════════════════════════
  redis-master:
    image: redis:7-alpine
    container_name: medusa_redis_master
    restart: unless-stopped
    command: >
      redis-server
      --requirepass R3d1sSecurePass2026
      --masterauth R3d1sSecurePass2026
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis_master_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "R3d1sSecurePass2026", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medusa_network

  # ═══════════════════════════════════════════════════════════════
  # Redis HA: Replica Node (Slave)
  # Master'dan replikasyon alır, otomatik failover için hazır
  # ═══════════════════════════════════════════════════════════════
  redis-replica:
    image: redis:7-alpine
    container_name: medusa_redis_replica
    restart: unless-stopped
    command: >
      redis-server
      --requirepass R3d1sSecurePass2026
      --masterauth R3d1sSecurePass2026
      --replicaof redis-master 6379
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
    expose:
      - "6379"
    volumes:
      - redis_replica_data:/data
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "R3d1sSecurePass2026", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medusa_network

  # ═══════════════════════════════════════════════════════════════
  # Redis Sentinel 1 — Master izleme ve otomatik failover
  # ═══════════════════════════════════════════════════════════════
  redis-sentinel-1:
    image: redis:7-alpine
    container_name: medusa_sentinel_1
    restart: unless-stopped
    volumes:
      - ./docker/sentinel.conf:/etc/redis/sentinel.conf:ro
    command: sh -c "cp /etc/redis/sentinel.conf /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
    expose:
      - "26379"
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - medusa_network

  # ═══════════════════════════════════════════════════════════════
  # Redis Sentinel 2
  # ═══════════════════════════════════════════════════════════════
  redis-sentinel-2:
    image: redis:7-alpine
    container_name: medusa_sentinel_2
    restart: unless-stopped
    volumes:
      - ./docker/sentinel.conf:/etc/redis/sentinel.conf:ro
    command: sh -c "cp /etc/redis/sentinel.conf /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
    expose:
      - "26379"
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - medusa_network

  # ═══════════════════════════════════════════════════════════════
  # Redis Sentinel 3
  # ═══════════════════════════════════════════════════════════════
  redis-sentinel-3:
    image: redis:7-alpine
    container_name: medusa_sentinel_3
    restart: unless-stopped
    volumes:
      - ./docker/sentinel.conf:/etc/redis/sentinel.conf:ro
    command: sh -c "cp /etc/redis/sentinel.conf /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
    expose:
      - "26379"
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - medusa_network

  # ═══════════════════════════════════════════════════════════════
  # Meilisearch (Hybrid Search Engine)
  # ═══════════════════════════════════════════════════════════════
  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: medusa_meilisearch
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_MASTER_KEY}
      - MEILI_NO_ANALYTICS=true
    expose:
      - "7700"
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped
    networks:
      - medusa_network

  # ═══════════════════════════════════════════════════════════════
  # OpenTelemetry (Jaeger) - İzlenebilirlik Altyapısı
  # ═══════════════════════════════════════════════════════════════
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: medusa_jaeger
    restart: unless-stopped
    ports:
      - "16686:16686" # Web UI
      - "4317:4317"   # OTLP gRPC (opsiyonel)
      - "4318:4318"   # OTLP HTTP
    networks:
      - medusa_network

  # ═══════════════════════════════════════════════════════════════
  # MEDUSA SERVER (API ONLY)
  # ═══════════════════════════════════════════════════════════════
  medusa-server:
    build: .
    container_name: medusa_server_core_v2
    working_dir: /server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      jaeger:
        condition: service_started
    command: [ "/bin/sh", "./start.sh" ]
    ports:
      - "9000:9000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MEDUSA_WORKER_MODE=server
      - JWT_SECRET=${JWT_SECRET}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_MASTER_KEY=${MEILISEARCH_MASTER_KEY}
      - NODE_OPTIONS=--max-old-space-size=4096
      # Redis Sentinel config
      - REDIS_SENTINEL_HOSTS=redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      - REDIS_SENTINEL_MASTER_NAME=medusa-master
      - REDIS_PASSWORD=R3d1sSecurePass2026
      # OpenTelemetry Config
      - OTEL_SERVICE_NAME=medusa-server
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
    env_file:
      - .env
    volumes:
      - .:/server
      - /server/node_modules
    networks:
      - medusa_network

  # ═══════════════════════════════════════════════════════════════
  # MEDUSA WORKER (WORKER ONLY)
  # ═══════════════════════════════════════════════════════════════
  medusa-worker:
    build: .
    container_name: medusa_worker_core_v2
    working_dir: /server
    restart: unless-stopped
    depends_on:
      - medusa-server
      - postgres
      - redis-master
      - jaeger
    command: [ "/bin/sh", "./start.sh" ]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MEDUSA_WORKER_MODE=worker
      - JWT_SECRET=${JWT_SECRET}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_MASTER_KEY=${MEILISEARCH_MASTER_KEY}
      - NODE_OPTIONS=--max-old-space-size=4096
      # Redis Sentinel config
      - REDIS_SENTINEL_HOSTS=redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      - REDIS_SENTINEL_MASTER_NAME=medusa-master
      - REDIS_PASSWORD=R3d1sSecurePass2026
      # OpenTelemetry Config
      - OTEL_SERVICE_NAME=medusa-worker
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
    env_file:
      - .env
    volumes:
      - .:/server
      - /server/node_modules
    networks:
      - medusa_network

  # ═══════════════════════════════════════════════════════════════
  # STOREFRONT (Next.js 15)
  # ═══════════════════════════════════════════════════════════════
  storefront:
    build:
      context: ./storefront
      dockerfile: Dockerfile
    container_name: medusa_storefront
    working_dir: /app
    restart: unless-stopped
    command: ["npm", "run", "dev"]
    ports:
      - "8000:8000"
    environment:
      # Storefront, backend'in NODE_ENV'inden bağımsız: dev mode'da
      # HMR kullanıyor (Dockerfile npm run dev). NODE_ENV=production
      # 'Code generation from strings disallowed' middleware hatası verir.
      - NODE_ENV=development
      - MEDUSA_BACKEND_URL=http://medusa-server:9000
      - NEXT_PUBLIC_MEDUSA_BACKEND_URL=http://localhost:9000
      - NEXT_PUBLIC_SEARCH_ENDPOINT=http://localhost:9000
      - NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${PUBLISHABLE_API_KEY}
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_MASTER_KEY=${MEILISEARCH_MASTER_KEY}
    volumes:
      - ./storefront:/app
      - /app/node_modules
      - /app/.next
    networks:
      - medusa_network
    depends_on:
      - medusa-server

volumes:
  postgres_data:
  redis_master_data:
  redis_replica_data:
  meilisearch_data:

networks:
  medusa_network:
    driver: bridge
