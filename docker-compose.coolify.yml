# ═══════════════════════════════════════════════════════════════════════
# Coolify Production Deployment — Sadeleştirilmiş (6 servis)
# ───────────────────────────────────────────────────────────────────────
# Tek sunucu için: Redis Sentinel HA + n8n çıkarıldı (gereksiz karmaşıklık).
# postgres + redis + meilisearch + medusa-server + medusa-worker + storefront
#
# Environment değişkenleri Coolify panelinden girilir (bkz. .env.coolify.example).
# Backend: Dockerfile.production (multi-stage, npm run build)
# Storefront: Dockerfile (dev mode — next dev; build backend bağımlılığı yok)
# ═══════════════════════════════════════════════════════════════════════
services:
  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medusa-genesis}
      POSTGRES_USER: ${POSTGRES_USER:-medusa_db_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medusa_db_user}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - medusa_network

  # ── Otomatik veritabanı yedeği ──
  # Günde bir kez pg_dump alır (gzip), son 7 yedeği tutar. Yedekler kalıcı
  # db_backups volume'ünde. Felaket kurtarma için kritik. (İleride dışarı/offsite
  # kopya eklenebilir.)
  db-backup:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PG_DB: ${POSTGRES_DB:-medusa-genesis}
      PG_USER: ${POSTGRES_USER:-medusa_db_user}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[db-backup] aktif — her 24 saatte bir yedek alinacak (son 7 saklanir).";
        while true; do
          TS=$$(date +%Y%m%d-%H%M%S);
          echo "[db-backup] yedek aliniyor: $$TS";
          if pg_dump -h postgres -U "$$PG_USER" "$$PG_DB" | gzip > "/backups/db-$$TS.sql.gz"; then
            echo "[db-backup] tamamlandi: db-$$TS.sql.gz";
          else
            echo "[db-backup] HATA: yedek alinamadi";
            rm -f "/backups/db-$$TS.sql.gz";
          fi;
          ls -1t /backups/db-*.sql.gz 2>/dev/null | tail -n +8 | xargs -r rm -f;
          sleep 86400;
        done
    volumes:
      - db_backups:/backups
    networks:
      - medusa_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-R3d1sSecurePass2026}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-R3d1sSecurePass2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - medusa_network

  meilisearch:
    image: getmeili/meilisearch:v1.13
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - medusa_network

  # ── Ollama: açık kaynak AI motoru (Gemini'nin yerine) ──
  # Self-hosted, kota yok, veri dışarı çıkmaz. Modeller kalıcı volume'da tutulur.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      # 64GB RAM: ana model (qwen3.6 ~20GB) + embed (nomic ~0.3GB) AYNI ANDA bellekte kalsın
      # → model takası/yeniden yükleme (50-70sn) ortadan kalkar.
      OLLAMA_MAX_LOADED_MODELS: "2"
      # Eşzamanlı tek istek → bellek/CPU tepe yükünü sınırla (CPU inference).
      OLLAMA_NUM_PARALLEL: "1"
      # Model bellekte kalsın (boşalıp her çağrıda 60sn yeniden yüklenmesin).
      OLLAMA_KEEP_ALIVE: "-1"
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - medusa_network

  # ── Ollama model indirici (tek seferlik; idempotent — model varsa atlar) ──
  # Deploy sırasında qwen2.5:14b + nomic-embed-text modellerini otomatik çeker.
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[ollama-init] Ollama sunucusu bekleniyor...";
        until ollama list >/dev/null 2>&1; do sleep 3; done;
        echo "[ollama-init] qwen3.6:35b-a3b (tek model: chat+blog+admin tool, MoE 3B aktif) indiriliyor (~20GB)...";
        ollama pull qwen3.6:35b-a3b;
        echo "[ollama-init] nomic-embed-text (embedding) indiriliyor...";
        ollama pull nomic-embed-text;
        echo "[ollama-init] Modeller hazir.";
    restart: "no"
    networks:
      - medusa_network

  medusa-server:
    build:
      context: .
      dockerfile: Dockerfile.production
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
      ollama:
        condition: service_started
    command: ["/bin/sh", "./start.sh"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-medusa_db_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-medusa-genesis}
      REDIS_URL: redis://:${REDIS_PASSWORD:-R3d1sSecurePass2026}@redis:6379
      MEDUSA_WORKER_MODE: server
      # Admin paneli: varsayılan AÇIK. Sorun olursa Coolify'da DISABLE_MEDUSA_ADMIN=true
      # yapıp restart ederek anında API-only güvenli moda dönülebilir.
      DISABLE_MEDUSA_ADMIN: ${DISABLE_MEDUSA_ADMIN:-false}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      STORE_CORS: ${STORE_CORS}
      ADMIN_CORS: ${ADMIN_CORS}
      AUTH_CORS: ${AUTH_CORS}
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      OLLAMA_API_URL: ${OLLAMA_API_URL:-http://ollama:11434}
      OLLAMA_MODEL_NAME: ${OLLAMA_MODEL_NAME:-qwen3.6:35b-a3b}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen3.6:35b-a3b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-290000}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-tnt_default}
      # Yüklenen görsellerin public adresi (yerel dosya deposu için)
      FILE_PUBLIC_URL: ${PUBLIC_BACKEND_URL:-http://localhost:9000}
      NODE_OPTIONS: --max-old-space-size=4096
      # Coolify magic: backend'e ayrı subdomain ata, Traefik 9000'e yönlendirir
      # https:// → Coolify/Traefik Let's Encrypt sertifikası alır (admin login için şart)
      SERVICE_FQDN_MEDUSASERVER_9000: https://api.141.98.48.155.sslip.io
    expose:
      - "9000"
    volumes:
      # Yüklenen görseller kalıcı olsun (deploy/restart'ta silinmesin)
      - uploads_data:/server/.medusa/server/static
    networks:
      - medusa_network

  medusa-worker:
    build:
      context: .
      dockerfile: Dockerfile.production
    restart: unless-stopped
    depends_on:
      medusa-server:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    command: ["/bin/sh", "./start.sh"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-medusa_db_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-medusa-genesis}
      REDIS_URL: redis://:${REDIS_PASSWORD:-R3d1sSecurePass2026}@redis:6379
      MEDUSA_WORKER_MODE: worker
      DISABLE_MEDUSA_ADMIN: "true"
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      OLLAMA_API_URL: ${OLLAMA_API_URL:-http://ollama:11434}
      OLLAMA_MODEL_NAME: ${OLLAMA_MODEL_NAME:-qwen3.6:35b-a3b}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen3.6:35b-a3b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      NODE_OPTIONS: --max-old-space-size=4096
    networks:
      - medusa_network

  storefront:
    build:
      context: ./storefront
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* değerleri build sırasında client bundle'a gömülür.
      args:
        NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${PUBLIC_BACKEND_URL}
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${PUBLISHABLE_API_KEY}
        NEXT_PUBLIC_BASE_URL: ${PUBLIC_STOREFRONT_URL}
        NEXT_PUBLIC_SEARCH_ENDPOINT: ${PUBLIC_BACKEND_URL}
    restart: unless-stopped
    # Production: next start (next dev kaldırıldı — kararsızlık/504 sebebi)
    command: ["npm", "run", "start"]
    depends_on:
      medusa-server:
        condition: service_started
    environment:
      NODE_ENV: production
      MEDUSA_BACKEND_URL: http://medusa-server:9000
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${PUBLIC_BACKEND_URL}
      NEXT_PUBLIC_SEARCH_ENDPOINT: ${PUBLIC_BACKEND_URL}
      NEXT_PUBLIC_BASE_URL: ${PUBLIC_STOREFRONT_URL}
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${PUBLISHABLE_API_KEY}
      MEDUSA_PUBLISHABLE_KEY: ${PUBLISHABLE_API_KEY}
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      # Coolify magic: storefront'a ana domain ata, Traefik 8000'e yönlendirir
      # https:// → Let's Encrypt sertifikası (güvenli site, checkout için şart)
      SERVICE_FQDN_STOREFRONT_8000: https://ayna.141.98.48.155.sslip.io
    expose:
      - "8000"
    networks:
      - medusa_network

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  ollama_data:
  uploads_data:
  db_backups:

networks:
  medusa_network:
    driver: bridge
